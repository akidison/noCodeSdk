<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pushwoosh NoCode SDK Builder</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #2ea44f;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        .logo h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .logo h1 span {
            color: #8b949e;
            font-weight: 400;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #21262d;
            color: #e1e4e8;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s;
        }

        .btn:hover { background: #30363d; }

        .btn-primary {
            background: #2ea44f;
            border-color: #2ea44f;
            color: white;
        }

        .btn-primary:hover { background: #3fb950; }

        .btn-blue {
            background: #1f6feb;
            border-color: #1f6feb;
            color: white;
        }

        .btn-blue:hover { background: #388bfd; }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #blocklyDiv {
            flex: 1;
        }

        .sidebar {
            width: 420px;
            background: #161b22;
            border-left: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h2 {
            font-size: 14px;
            font-weight: 600;
        }

        .tab-buttons {
            display: flex;
            gap: 4px;
        }

        .tab-btn {
            padding: 4px 10px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: #8b949e;
            font-size: 12px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #30363d;
            color: #e1e4e8;
        }

        .code-output {
            flex: 1;
            overflow: auto;
            padding: 16px;
        }

        pre {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            color: #c9d1d9;
        }

        .status-bar {
            padding: 8px 16px;
            border-top: 1px solid #30363d;
            font-size: 12px;
            color: #8b949e;
            display: flex;
            justify-content: space-between;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 60px;
            right: 20px;
            background: #2ea44f;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Blockly theme overrides */
        .blocklyMainBackground { fill: #0f1117 !important; }
        .blocklyToolboxDiv { background: #161b22 !important; }
        .blocklyTreeRow { color: #e1e4e8 !important; }
        .blocklyFlyoutBackground { fill: #21262d !important; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">P</div>
            <h1>Pushwoosh <span>NoCode Builder</span></h1>
        </div>
        <div class="actions">
            <button class="btn" onclick="clearWorkspace()">Clear</button>
            <button class="btn btn-blue" onclick="copyJSON()">Copy JSON</button>
            <button class="btn btn-primary" onclick="downloadJSON()">Download JSON</button>
        </div>
    </header>

    <div class="main">
        <div id="blocklyDiv"></div>
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Generated Config</h2>
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab('json', this)">JSON</button>
                    <button class="tab-btn" onclick="switchTab('swift', this)">Swift</button>
                </div>
            </div>
            <div class="code-output">
                <pre id="codeOutput">// Drag blocks to build your config</pre>
            </div>
            <div class="status-bar">
                <span id="actionCount">0 actions</span>
                <span>pushwoosh-nocode.json</span>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="blocks.js"></script>
    <script src="generators.js"></script>
    <script src="app.js"></script>
</body>
</html>
